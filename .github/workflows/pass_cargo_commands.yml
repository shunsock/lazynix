name: Cargo Commands CI

# workflow-level の paths filter は使わない。rust 無関係な PR (github-actions 更新等) で
# workflow 自体が発火せず、required status check が「待ち」で詰まるのを避けるため。
# 変更範囲の判定は detect-changes ジョブ (dorny/paths-filter) が内部で行い、
# rust に無関係な PR では cargo ジョブが skip される (skip された required check は passing 扱い)。
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed crates
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      app: ${{ steps.filter.outputs.app }}
      domain: ${{ steps.filter.outputs.domain }}
      infra: ${{ steps.filter.outputs.infra }}
      any-crate: ${{ steps.filter.outputs.any-crate }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
        id: filter
        with:
          filters: |
            cli:
              - crates/lnix/src/**/*.rs
              - crates/lnix/tests/**/*.rs
              # the binary embeds these via include_str! until #30
              - crates/lnix-infra/templates/**
              - crates/lnix/Cargo.toml
            app:
              - crates/lnix-app/src/**/*.rs
              - crates/lnix-app/Cargo.toml
            domain:
              - crates/lnix-domain/src/**/*.rs
              - crates/lnix-domain/Cargo.toml
            infra:
              - crates/lnix-infra/src/**/*.rs
              - crates/lnix-infra/templates/**
              - crates/lnix-infra/Cargo.toml
            any-crate:
              - crates/*/src/**/*.rs
              - crates/*/tests/**/*.rs
              - crates/*/Cargo.toml
              - Cargo.toml
              - Cargo.lock

  cargo-fmt-and-clippy:
    name: cargo fmt + clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.any-crate == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Run cargo fmt
        run: cargo fmt --all --check

      - name: Run cargo clippy on cli
        if: needs.detect-changes.outputs.cli == 'true'
        run: cargo clippy -p lnix --all-targets -- --deny warnings

      - name: Run cargo clippy on app
        if: needs.detect-changes.outputs.app == 'true'
        run: cargo clippy -p lnix-app --all-targets -- --deny warnings

      - name: Run cargo clippy on domain
        if: needs.detect-changes.outputs.domain == 'true'
        run: cargo clippy -p lnix-domain --all-targets -- --deny warnings

      - name: Run cargo clippy on infra
        if: needs.detect-changes.outputs.infra == 'true'
        run: cargo clippy -p lnix-infra --all-targets -- --deny warnings

  cargo-test:
    name: cargo test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    needs: [detect-changes, cargo-fmt-and-clippy]
    if: needs.detect-changes.outputs.any-crate == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      # Tests spawn `nix eval` in parallel. Initialize the nix tarball
      # cache serially first, otherwise concurrent evaluations race on
      # ~/.cache/nix/tarball-cache/config.lock and fail spuriously.
      - name: Warm up nix flake registry cache
        run: nix eval nixpkgs#hello

      - name: Run cargo test on cli
        if: needs.detect-changes.outputs.cli == 'true'
        run: cargo test -p lnix

      - name: Run cargo test on app
        if: needs.detect-changes.outputs.app == 'true'
        run: cargo test -p lnix-app

      - name: Run cargo test on domain
        if: needs.detect-changes.outputs.domain == 'true'
        run: cargo test -p lnix-domain

      - name: Run cargo test on infra
        if: needs.detect-changes.outputs.infra == 'true'
        run: cargo test -p lnix-infra
