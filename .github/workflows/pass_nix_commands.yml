name: Nix Commands CI

on:
  pull_request:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock

permissions:
  contents: read

jobs:
  nix-flow:
    name: ${{ matrix.os }} run
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run nix build
        run: nix build

      - name: Run nix develop
        run: nix develop --command echo "Development shell activated successfully"

      - name: Run nix run
        run: nix run . -- --help
